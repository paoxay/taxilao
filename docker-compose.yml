services:
  mongodb:
    image: mongo:7
    container_name: taxilao-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - taxilao-mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  taxilao-mongodb-data:
